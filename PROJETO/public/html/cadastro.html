<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FamilyCare — Cadastro</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">

            <div class="auth-header">
                <div class="brand">
                    <span class="brand-icon">+</span>
                    <h1>FamilyCare</h1>
                </div>
                <h2>Crie sua Conta</h2>
                <p class="subtitle">Comece a organizar a saude da sua familia</p>
            </div>

            <form id="cadastro-form" class="settings-form">
                <div class="form-group">
                    <label for="reg-name">Nome Completo:</label>
                    <input type="text" id="reg-name" placeholder="Ex: Ana Costa" required>
                </div>
                <div class="form-group">
                    <label for="reg-email">E-mail:</label>
                    <input type="email" id="reg-email" placeholder="ana.costa@email.com" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">Senha:</label>
                    <input type="password" id="reg-password" placeholder="No minimo 6 caracteres" minlength="6" required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; padding: 14px;">
                    Criar Conta
                </button>
            </form>

            <div class="auth-footer">
                <p>Ja tem uma conta? <a href="/" class="auth-link">Faca login aqui</a></p>
            </div>

        </div>
    </div>

    <script src="/js/cadastro.js"></script>
</body>
</html>
